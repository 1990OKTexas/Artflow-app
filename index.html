<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtFlow | Favorites Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@800&family=Inter:wght@300;400;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; background: #030712; overflow-x: hidden; position: relative; }
        .ambient-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #030712 0%, #030712 100%); z-index: -2; transition: background 1s ease-out; }
        body.fusion-active .ambient-bg { background: radial-gradient(circle at 50% 50%, #1e3a8a 0%, #030712 70%); animation: pulseBg 10s ease-in-out infinite alternate; }
        @keyframes pulseBg { from { opacity: 0.8; } to { opacity: 1; } }
        
        .glass-panel { background: rgba(17, 24, 39, 0.75); backdrop-filter: blur(35px); border: 1px solid rgba(255, 255, 255, 0.12); }
        .gradient-border { position: relative; background: linear-gradient(180deg, #3b82f6, #8b5cf6) padding-box, linear-gradient(45deg, #3b82f6, #000) border-box; border: 2px solid transparent; }
        .logo-glow { filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.6)); }
        
        .neon-pulse { filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.8)); }
        .loading-viz { width: 40px; height: 40px; border-radius: 50%; background: #3b82f6; opacity: 0.7; animation: particlePop 1.2s ease-out infinite; }
        @keyframes particlePop { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex items-center justify-center">
    <div class="ambient-bg"></div>
    
    <div class="w-full max-w-4xl p-[1px] rounded-[2.5rem] gradient-border shadow-[0_0_60px_rgba(37,99,235,0.3)]">
        <div class="glass-panel w-full rounded-[2.5rem] p-8">
            <div class="flex flex-col items-center mb-6">
                <div class="mb-3 logo-glow"><svg width="80" height="80" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="50" fill="#3b82f6"/><circle cx="50" cy="50" r="20" fill="white"/></svg></div>
                <h1 class="text-3xl font-[800] text-white tracking-widest uppercase font-['Orbitron']">ArtFlow</h1>
            </div>
            
            <div class="flex gap-4 mb-6 border-b border-white/10 pb-4">
                <button id="genTabBtn" onclick="showTab('generate')" class="text-blue-400 font-bold border-b-2 border-blue-500 pb-1">GENERATE</button>
                <button id="favTabBtn" onclick="showTab('favorites')" class="text-gray-500 hover:text-white font-bold pb-1">FAVORITES</button>
            </div>
            
            <div id="generateTab" class="space-y-6">
                <textarea id="prompt" class="w-full p-4 bg-black/40 border border-white/10 text-white rounded-2xl focus:ring-2 focus:ring-blue-500/50 transition-all" rows="3" placeholder="Describe your vision..."></textarea>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[10px] text-blue-400 uppercase tracking-widest font-bold">Batch Count</label>
                        <select id="count" class="bg-black/40 text-white border border-white/10 p-4 rounded-2xl w-full">
                            <option value="1">1 Image</option><option value="2">2 Images</option><option value="3">3 Images</option><option value="4">4 Images</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] text-blue-400 uppercase tracking-widest font-bold">Aspect Ratio</label>
                        <select id="ratio" class="bg-black/40 text-white border border-white/10 p-4 rounded-2xl w-full">
                            <option value="1:1">1:1 Square</option><option value="9:16">9:16 Portrait</option><option value="16:9">16:9 Landscape</option>
                        </select>
                    </div>
                </div>
                
                <button id="generateBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl">GENERATE</button>
                <div id="resultArea" class="hidden">
                    <div id="loading" class="flex flex-col items-center justify-center p-8 hidden"><div class="loading-viz mb-4"></div></div>
                    <div id="gridContainer" class="flex flex-wrap justify-center gap-4"></div>
                </div>
            </div>

            <div id="favoritesTab" class="hidden min-h-[300px]">
                <div id="favGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
            </div>
        </div>
    </div>

    <script>
        // API Connection Configuration
        const apiConfig = {
            model: "gemini-2.5-flash-image-preview",
            endpoint: "https://generativelanguage.googleapis.com/v1beta/models/",
            apiKey: "YOUR_GEMINI_API_KEY_HERE", // Paste your API key here
            headers: {
                'Content-Type': 'application/json'
            }
        };

        let favorites = [];

        function showTab(tab) {
            document.getElementById('generateTab').classList.toggle('hidden', tab !== 'generate');
            document.getElementById('favoritesTab').classList.toggle('hidden', tab !== 'favorites');
            document.getElementById('genTabBtn').className = tab === 'generate' ? 'text-blue-400 font-bold border-b-2 border-blue-500 pb-1' : 'text-gray-500 hover:text-white font-bold pb-1';
            document.getElementById('favTabBtn').className = tab === 'favorites' ? 'text-blue-400 font-bold border-b-2 border-blue-500 pb-1' : 'text-gray-500 hover:text-white font-bold pb-1';
            if (tab === 'favorites') renderFavorites();
        }

        function renderFavorites() {
            const grid = document.getElementById('favGrid');
            grid.innerHTML = favorites.length ? '' : '<p class="text-gray-500 text-center col-span-full mt-10">No favorites yet.</p>';
            favorites.forEach((item, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'relative group w-full';
                wrapper.innerHTML = `
                    <img src="${item.src}" class="w-full aspect-square object-cover rounded-2xl border border-white/10 neon-pulse">
                    <button onclick="deleteFav(${index})" class="absolute top-2 right-2 bg-red-600 p-1.5 rounded-full text-white text-xs font-bold">X</button>
                `;
                grid.appendChild(wrapper);
            });
        }

        function deleteFav(index) { favorites.splice(index, 1); renderFavorites(); }

        document.getElementById('generateBtn').addEventListener('click', async () => {
            const promptInput = document.getElementById('prompt').value.trim();
            const count = parseInt(document.getElementById('count').value);
            const ratio = document.getElementById('ratio').value;
            if (!promptInput) return;

            const gridContainer = document.getElementById('gridContainer');
            gridContainer.innerHTML = '';
            document.getElementById('resultArea').classList.remove('hidden');
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('generateBtn').disabled = true;

            // Define request parameters based on provider (Gemini format)
            const requestUrl = `${apiConfig.endpoint}${apiConfig.model}:generateContent?key=${apiConfig.apiKey}`;
            const requestHeaders = apiConfig.headers;

            // Loop to generate batch count
            for (let i = 0; i < count; i++) {
                try {
                    // Structure the prompt with ratio instruction
                    const prompt = `${promptInput}. Aspect ratio: ${ratio}.`;

                    // Construct the Gemini-specific request body
                    const requestBody = JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: {
                            responseModalities: ['IMAGE']
                        }
                    });

                    // Send Request
                    const response = await fetch(requestUrl, {
                        method: 'POST',
                        headers: requestHeaders,
                        body: requestBody
                    });

                    // Parse Response
                    const data = await response.json();

                    // Extract Base64 Image Data (Gemini format)
                    const base64 = data.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;

                    if (base64) {
                        const src = `data:image/png;base64,${base64}`;
                        
                        // Create and Insert Element
                        const wrapper = document.createElement('div');
                        wrapper.className = 'relative group w-48';
                        wrapper.innerHTML = `
                            <img src="${src}" class="w-full rounded-2xl border border-white/10 neon-pulse">
                            <button onclick="favorites.push({src: '${src}'}); alert('Saved!')" class="absolute top-2 right-2 bg-yellow-500 p-2 rounded-full text-black font-bold text-xs">★</button>
                        `;
                        gridContainer.appendChild(wrapper);
                        document.body.classList.add('fusion-active');
                    }
                } catch (e) { console.error("Generation error:", e); }
            }
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('generateBtn').disabled = false;
        });
    </script>
</body>
</html>
